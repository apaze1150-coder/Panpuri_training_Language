<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PANPURI Chinese Teacher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Prompt', 'Noto Sans SC', sans-serif; background-color: #f8fafc; }
    .mic-recording { animation: pulse 1.5s infinite; background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
  </style>
</head>
<body>
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-md relative flex flex-col">
    <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between bg-white sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white shadow-sm"><i class="fas fa-leaf text-xs"></i></div>
            <div>
                <h1 class="font-bold text-gray-900 leading-none">PAÑPURI</h1>
                <span class="text-[10px] text-gray-500 tracking-wider">CHINESE TEACHER</span>
            </div>
        </div>
    </div>

    <div class="p-5 flex flex-col gap-4 flex-grow">
        
        <div>
            <label class="block mb-2 text-sm font-medium text-gray-700">เลือกหมวดหมู่สินค้า:</label>
            <select id="categorySelect" onchange="changeCategory()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-black focus:border-black block w-full p-2.5 shadow-sm">
                <option value="">กำลังโหลดข้อมูล...</option>
            </select>
        </div>

        <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 text-center relative shadow-sm mt-2">
            <span id="categoryBadge" class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-black text-white text-[10px] px-3 py-1 rounded-full tracking-widest">-</span>
            <img id="productImage" src="" alt="Product Image" class="w-32 h-32 object-contain mx-auto rounded-lg mb-3 hidden shadow-sm border border-gray-100 p-1">
            <p class="text-gray-400 text-xs mt-2">ประโยคเป้าหมาย:</p>
            <h2 id="chineseText" class="text-2xl font-bold text-gray-900 mt-2 mb-1">กำลังโหลด...</h2>
            <p id="pinyinText" class="text-gray-500 italic text-sm">-</p>
            <div class="mt-4 pt-4 border-t border-gray-200"><p id="thaiText" class="text-sm text-gray-600">-</p></div>
            <div id="vocabBox" class="mt-4 bg-yellow-50 rounded-xl p-4 border border-yellow-100 hidden text-left shadow-sm">
            <h3 class="font-bold text-yellow-800 text-sm mb-2"><i class="fas fa-book-open mr-1"></i> คำศัพท์น่ารู้</h3>
            <ul id="vocabList" class="text-xs text-gray-700 space-y-1.5 leading-relaxed">
                </ul>
        </div>
        </div>

        <div class="flex justify-between items-center px-2">
            <button onclick="prevLesson()" class="text-gray-600 bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-bold transition"><i class="fas fa-chevron-left mr-1"></i> ก่อนหน้า</button>
            <span id="lessonCounter" class="text-xs text-gray-500 font-medium">0 / 0</span>
            <button onclick="nextLesson()" class="text-gray-600 bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-bold transition">ถัดไป <i class="fas fa-chevron-right ml-1"></i></button>
        </div>

        <div class="flex justify-center items-center gap-6 my-4">
            <button onclick="playExampleAudio()" class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shadow-sm border border-blue-100 hover:bg-blue-100 transition"><i class="fas fa-volume-up text-lg"></i></button>
            <button id="recordBtn" onclick="startRecording()" class="w-16 h-16 rounded-full bg-gray-50 text-gray-700 flex items-center justify-center shadow-md border border-gray-200 hover:bg-gray-100 transition relative disabled:opacity-50" disabled><i class="fas fa-microphone text-2xl"></i></button>
            <button id="stopBtn" onclick="stopRecording()" class="w-12 h-12 rounded-full bg-red-50 text-red-400 flex items-center justify-center shadow-sm border border-red-100 hover:bg-red-100 transition opacity-50 cursor-not-allowed" disabled><i class="fas fa-paper-plane text-lg text-red-500"></i></button>
        </div>

        <div id="statusMsg" class="text-center text-sm text-blue-600 h-6 font-medium animate-pulse">กำลังซิงค์ข้อมูล...</div>

        <div id="resultBox" class="hidden bg-green-50 rounded-2xl p-5 border border-green-100 shadow-sm transition-all mb-4">
            <h3 class="font-bold text-green-800 border-b border-green-200 pb-2 mb-3"><i class="fas fa-check-circle mr-2"></i>ผลการประเมิน</h3>
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-700 text-sm">คะแนน:</span>
                <span class="text-3xl font-bold text-green-600"><span id="scoreText">0</span><span class="text-sm text-green-500">/100</span></span>
            </div>
            <div class="mb-3">
                <span class="text-gray-700 block text-xs mb-1">คำที่ควรปรับปรุง:</span>
                <span id="wrongWordsText" class="text-red-500 font-medium bg-red-50 border border-red-100 px-2 py-1 rounded text-sm inline-block"></span>
            </div>
            <div>
                <span class="text-gray-700 block text-xs mb-1">คำแนะนำ:</span>
                <p id="feedbackText" class="text-gray-800 text-sm bg-white p-3 rounded-lg border border-green-100 shadow-sm"></p>
            </div>
        </div>
    </div>
  </div>

  <script>
    // 🛑 นำ URL จาก Apps Script (ที่เพิ่งก๊อปปี้มาใหม่) มาวางตรงนี้ครับ 🛑
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxKZqvEyIWN7XB1BRLLZmMl_hdRtnY9OfUIeZAg9iZ3DiDmNQ4TciI0l1ccKgx9abAfbA/exec"; 

    let allLessons = [];
    let currentCategoryLessons = [];
    let currentIndex = 0;
    
    let mediaRecorder;
    let audioChunks = [];

    // โหลดข้อมูลเมื่อเปิดเว็บ
    window.onload = () => {
        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                if(data.error) throw new Error(data.error);
                allLessons = data;
                setupCategories();
                document.getElementById('recordBtn').disabled = false;
            })
            .catch(err => {
                document.getElementById('statusMsg').innerText = "❌ โหลดข้อมูลไม่สำเร็จ: " + err.message;
            });
    };

    // จัดการหมวดหมู่
    function setupCategories() {
        const categories = [...new Set(allLessons.map(item => item.category))];
        const select = document.getElementById('categorySelect');
        select.innerHTML = '';
        categories.forEach(cat => {
            select.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
        changeCategory(); // โหลดหมวดแรก
    }

    function changeCategory() {
        const selectedCat = document.getElementById('categorySelect').value;
        currentCategoryLessons = allLessons.filter(item => item.category === selectedCat);
        currentIndex = 0;
        updateUI();
    }

    function prevLesson() {
        if (currentIndex > 0) { currentIndex--; updateUI(); }
    }

    function nextLesson() {
        if (currentIndex < currentCategoryLessons.length - 1) { currentIndex++; updateUI(); }
    }

    // อัปเดตหน้าจอ
    function updateUI() {
        const lesson = currentCategoryLessons[currentIndex];
        document.getElementById('categoryBadge').innerText = lesson.category;
        document.getElementById('chineseText').innerText = lesson.chineseText;
        document.getElementById('pinyinText').innerText = `(${lesson.pinyinText})`;
        document.getElementById('thaiText').innerText = `ความหมาย: ${lesson.thaiText}`;
        
        // จัดการรูปภาพ
        const imgEl = document.getElementById('productImage');
        if (lesson.imageUrl && lesson.imageUrl.trim() !== "") {
            imgEl.src = lesson.imageUrl;
            imgEl.classList.remove('hidden');
        } else {
            imgEl.classList.add('hidden');
        }
        
        // 🔥 จัดการคำศัพท์ (ส่วนที่เพิ่มมาใหม่) 🔥
        const vocabBox = document.getElementById('vocabBox');
        const vocabList = document.getElementById('vocabList');
        if (lesson.vocab && lesson.vocab.trim() !== "") {
            const words = lesson.vocab.split('|'); // แยกคำด้วยเครื่องหมาย |
            vocabList.innerHTML = words.map(w => `<li class="border-b border-yellow-200/50 pb-1 last:border-0"><span class="text-yellow-600 mr-1">✨</span> ${w.trim()}</li>`).join('');
            vocabBox.classList.remove('hidden');
        } else {
            vocabBox.classList.add('hidden');
        }
        
        document.getElementById('lessonCounter').innerText = `${currentIndex + 1} / ${currentCategoryLessons.length}`;
        document.getElementById('statusMsg').innerText = "";
        document.getElementById('resultBox').classList.add('hidden'); 
    }

    // ระบบเสียงพูดและบันทึกเสียง (เหมือนเดิม)
    function playExampleAudio() {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(document.getElementById('chineseText').innerText);
        utterance.lang = 'zh-CN'; utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          sendToAI(new Blob(audioChunks, { type: 'audio/webm' }));
          audioChunks = []; 
        };
        mediaRecorder.start();
        
        document.getElementById('recordBtn').disabled = true;
        document.getElementById('recordBtn').classList.add('mic-recording');
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('stopBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        document.getElementById('statusMsg').innerText = "🎙️ กำลังฟัง... พูดได้เลยครับ";
        document.getElementById('resultBox').classList.add('hidden');
      } catch (err) { alert("กรุณาอนุญาตการใช้ไมโครโฟนครับ"); }
    }

    function stopRecording() {
      mediaRecorder.stop();
      document.getElementById('recordBtn').disabled = false;
      document.getElementById('recordBtn').classList.remove('mic-recording');
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('stopBtn').classList.add('opacity-50', 'cursor-not-allowed');
      document.getElementById('statusMsg').innerText = "⏳ กำลังวิเคราะห์น้ำเสียง... รอสักครู่";
    }

    function sendToAI(blob) {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = function() {
        const currentTargetText = document.getElementById('chineseText').innerText; // ดึงประโยคเป้าหมายปัจจุบัน
        
        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ audioBase64: reader.result, targetSentence: currentTargetText }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('statusMsg').innerText = "";
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('scoreText').innerText = data.score || 0;
            document.getElementById('wrongWordsText').innerText = (data.wrong_words && data.wrong_words.length > 0) ? data.wrong_words.join(", ") : "ไม่มี (เป๊ะมาก!)";
            document.getElementById('feedbackText').innerText = data.feedback || "พยายามต่อไปครับ!";
        })
        .catch(error => { document.getElementById('statusMsg').innerText = "❌ ขัดข้อง: " + error.message; });
      };
    }
  </script>
</body>
</html>
