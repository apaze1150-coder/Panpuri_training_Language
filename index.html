<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="application-name" content="Chinese Teacher">
    <meta name="apple-mobile-web-app-title" content="Chinese Teacher">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png?v=2">
    
    <title>PAÑPURI Chinese Teacher</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Noto+Sans+SC:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. ล็อก body ไม่ให้เลื่อนทะลุ */
        body { 
            font-family: 'Prompt', 'Noto Sans SC', sans-serif; 
            background-color: #1A1A1A; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* ล็อกความสูง */
            -webkit-tap-highlight-color: transparent; 
        }

        /* 2. ล็อกแอปให้สูงพอดีหน้าจอมือถือ (ไม่ยืดขาวลงไปยาวๆ) */
        #main-app { 
            height: 100dvh;
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-select { -webkit-user-select: none; user-select: none; }
        
        /* Mic Recording Animation */
        .mic-recording { animation: pulse 1.5s infinite; background-color: #ef4444 !important; color: white !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* สไลด์ Animation */
        .slide-next { animation: slideNext 0.35s ease-out; }
        .slide-prev { animation: slidePrev 0.35s ease-out; }
        @keyframes slideNext { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slidePrev { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Keynote Product Styles */
        .keynote-product-name { background-color: #f9fbf9; border-left: 5px solid #00472F; }
        .chinese-title { font-size: 1.5rem; font-weight: bold; color: #00472F; background: #e6eee6; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .pinyin-title { color: #666; font-style: italic; display: block; margin-top: 5px; }

        /* ซ่อน Scrollbar ด้านข้างให้ดูมินิมอล แต่ยังเลื่อนได้ */
        .scroll-area::-webkit-scrollbar { display: none; }
        .scroll-area { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="main-app" class="max-w-md mx-auto bg-white shadow-md relative flex flex-col no-select overflow-hidden">
        
        <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between bg-white sticky top-0 z-20 flex-shrink-0">
            <div class="flex items-center gap-3">
                
                <div class="w-11 h-11 overflow-hidden rounded-full border border-[#C5A059] bg-[#1A1A1A] flex items-center justify-center shadow-sm">
                    <img src="logo.png?v=2" class="w-full h-full object-contain p-1">
                </div>
                
                <div>
                    <h1 class="font-bold text-gray-900 leading-none tracking-tight" style="font-family: 'Playfair Display', serif;">PAÑPURI</h1>
                    <div class="flex items-center gap-1 mt-1">
                        <span class="text-[9px] text-white bg-[#00472F] px-1.5 py-0.5 rounded font-bold tracking-widest">AI AGENT</span>
                        <span class="text-[9px] text-gray-400 tracking-wider font-semibold">CHINESE TEACHER</span>
                    </div>
                </div>
            </div>
            <div class="text-[#00472F] opacity-20">
                <i class="fas fa-leaf text-xl"></i>
            </div>
        </div>

        <div class="p-5 flex flex-col gap-4 flex-grow overflow-y-auto scroll-area pb-10">
            
            <div class="flex flex-col gap-3">
                <button onclick="loadFavoritesMode()" class="bg-red-50 text-red-600 border border-red-100 text-xs font-semibold py-2.5 rounded-xl shadow-sm active:scale-95 transition-transform">
                    ❤️ ทบทวนรายการโปรดของฉัน
                </button>
                <select id="categorySelect" onchange="changeCategory()" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl block w-full p-3 outline-none focus:ring-1 focus:ring-black">
                    <option value="">กำลังโหลดบทเรียน...</option>
                </select>
            </div>

            <div id="lessonCard" class="bg-gray-50 rounded-3xl p-6 border border-gray-100 text-center relative shadow-sm mt-2 min-h-[400px] flex flex-col justify-center transition-all">
                <span id="categoryBadge" class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-black text-white text-[10px] px-4 py-1 rounded-full tracking-widest shadow-md">-</span>
                
                <button onclick="toggleFavorite()" class="absolute top-4 right-4 text-2xl outline-none active:scale-125 transition-transform z-10">
                    <i id="favIcon" class="far fa-heart text-gray-300"></i>
                </button>

                <div id="cardContent">
                    <p id="scentText" class="text-sm font-bold text-gray-400 tracking-wide mb-1 hidden"></p>
                    <div id="keyNoteBox" class="mb-4 hidden">
                        <span id="keyNoteText" class="text-[11px] font-bold px-3 py-1 rounded-full shadow-sm"></span>
                    </div>
                    
                    <img id="productImage" src="" class="w-40 h-40 object-contain mx-auto rounded-2xl mb-4 hidden bg-white p-2 border border-gray-100 shadow-sm">
                    
                    <p class="text-gray-400 text-[10px] uppercase tracking-tighter mb-1 font-bold">Chinese Phrase</p>
                    <h2 id="chineseText" class="text-3xl font-bold text-gray-900 mb-1 leading-tight">...</h2>
                    <p id="pinyinText" class="text-gray-400 italic text-sm mb-4">...</p>
                    
                    <div id="thaiTextBox" class="pt-4 border-t border-gray-200 hidden">
                        <p id="thaiText" class="text-sm text-gray-600 font-medium"></p>
                    </div>

                    <div id="vocabBox" class="mt-4 bg-yellow-50 rounded-2xl p-4 border border-yellow-100 hidden text-left shadow-sm">
                        <h3 class="font-bold text-yellow-800 text-xs mb-2 uppercase tracking-wider">Vocabulary</h3>
                        <ul id="vocabList" class="text-xs text-gray-700 space-y-2"></ul>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center px-2 mt-2">
                <button onclick="prevLesson()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center active:bg-gray-200 transition-colors"><i class="fas fa-chevron-left text-gray-500"></i></button>
                <span id="lessonCounter" class="text-xs font-bold text-gray-400 bg-gray-100 px-4 py-1 rounded-full">0 / 0</span>
                <button onclick="nextLesson()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center active:bg-gray-200 transition-colors"><i class="fas fa-chevron-right text-gray-500"></i></button>
            </div>

            <div class="flex justify-center items-center gap-8 my-4">
                <button onclick="playExampleAudio()" class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center border border-blue-100 active:scale-90 transition-transform"><i class="fas fa-volume-up text-lg"></i></button>
                <button id="recordBtn" onclick="startRecording()" class="w-20 h-20 rounded-full bg-black text-white flex items-center justify-center shadow-xl active:scale-95 transition-transform disabled:opacity-20" disabled><i class="fas fa-microphone text-3xl"></i></button>
                <button id="stopBtn" onclick="stopRecording()" class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center border border-red-100 opacity-20 cursor-not-allowed" disabled><i class="fas fa-paper-plane"></i></button>
            </div>

            <div id="statusMsg" class="text-center text-[11px] font-bold text-blue-500 h-4 uppercase tracking-widest">Loading...</div>

            <div id="resultBox" class="hidden bg-emerald-50 rounded-3xl p-6 border border-emerald-100 shadow-sm mb-6 transition-all">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-emerald-800 text-sm font-bold">RESULT</h3>
                    <button onclick="toggleAIVoice()" class="bg-white px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-200 text-emerald-700 shadow-sm">
                        <i id="voiceIcon" class="fas fa-volume-up mr-1"></i> AI VOICE: <span id="voiceText">ON</span>
                    </button>
                </div>
                <div class="text-center mb-4">
                    <span class="text-5xl font-black text-emerald-600" id="scoreText">0</span><span class="text-emerald-400 text-sm">/100</span>
                </div>
                <div class="space-y-3">
                    <div>
                        <span class="text-[10px] font-bold text-emerald-400 uppercase">Improvement</span>
                        <p id="wrongWordsText" class="text-red-500 font-bold text-sm"></p>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-emerald-400 uppercase">Advice</span>
                        <p id="feedbackText" class="text-gray-700 text-sm leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzj5szbg3M8CO7PGrCa2Zz8M5TlOfmELrOYZXtZOaTgMhLoVzGApNk1_afHYYk2hVDHag/exec"; 
        let allLessons = [], currentCategoryLessons = [], currentIndex = 0;
        let mediaRecorder, audioChunks = [], isAIVoiceEnabled = true;
        let startX = 0;

        window.onload = () => {
            fetch(GAS_URL).then(res => res.json()).then(data => {
                allLessons = data;
                setupCategories();
                document.getElementById('recordBtn').disabled = false;
                document.getElementById('statusMsg').innerText = "Ready to Study";
            }).catch(err => document.getElementById('statusMsg').innerText = "Error Loading Data");

            // Swipe System
            const card = document.getElementById('lessonCard');
            card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            card.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 70) diff > 0 ? nextLesson() : prevLesson();
            });
        };

        function playSwipeSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        function setupCategories() {
            const cats = [...new Set(allLessons.map(i => i.category))];
            const sel = document.getElementById('categorySelect');
            sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
            changeCategory();
        }

        function changeCategory() {
            currentCategoryLessons = allLessons.filter(i => i.category === document.getElementById('categorySelect').value);
            currentIndex = 0;
            updateUI();
        }

        function nextLesson() { 
            if (currentIndex < currentCategoryLessons.length - 1) { 
                currentIndex++; 
                animateCard('slide-next'); 
                updateUI(); 
            } 
        }

        function prevLesson() { 
            if (currentIndex > 0) { 
                currentIndex--; 
                animateCard('slide-prev'); 
                updateUI(); 
            } 
        }

        function animateCard(cls) {
            playSwipeSound();
            const card = document.getElementById('lessonCard');
            card.classList.remove('slide-next', 'slide-prev');
            void card.offsetWidth; 
            card.classList.add(cls);
        }

        function updateUI() {
            const lesson = currentCategoryLessons[currentIndex];
            document.getElementById('categoryBadge').innerText = lesson.category;
            document.getElementById('chineseText').innerText = lesson.chineseText;
            document.getElementById('pinyinText').innerText = `(${lesson.pinyinText})`;
            
            // Scent & KeyNote Style
            const scentEl = document.getElementById('scentText');
            if(lesson.scent && lesson.scent !== "-") {
                scentEl.innerText = `SCENT: ${lesson.scent}`;
                scentEl.classList.remove('hidden');
            } else scentEl.classList.add('hidden');

            const knBox = document.getElementById('keyNoteBox');
            const knText = document.getElementById('keyNoteText');
            if(lesson.keyNote && lesson.keyNote !== "-") {
                knText.innerText = lesson.keyNote;
                knText.className = lesson.keyNote.includes('วิธีใช้') ? "bg-emerald-100 text-emerald-700" : "bg-gray-200 text-gray-600";
                knBox.classList.remove('hidden');
            } else knBox.classList.add('hidden');

            // Image
            const img = document.getElementById('productImage');
            if(lesson.imageUrl) { img.src = lesson.imageUrl; img.classList.remove('hidden'); }
            else img.classList.add('hidden');

            // Thai Text
            const thBox = document.getElementById('thaiTextBox');
            if(lesson.thaiText && lesson.thaiText !== "-") {
                document.getElementById('thaiText').innerText = lesson.thaiText;
                thBox.classList.remove('hidden');
            } else thBox.classList.add('hidden');

            // Vocab
            const vBox = document.getElementById('vocabBox');
            if(lesson.vocab) {
                const words = lesson.vocab.split('|');
                document.getElementById('vocabList').innerHTML = words.map(w => {
                    const clean = w.split('(')[0].trim();
                    return `<li onclick="speakWord('${clean}')" class="flex justify-between items-center py-1 border-b border-yellow-100 last:border-0"><span>${w}</span><i class="fas fa-volume-up text-yellow-400"></i></li>`;
                }).join('');
                vBox.classList.remove('hidden');
            } else vBox.classList.add('hidden');

            // Favorite Icon
            const favs = JSON.parse(localStorage.getItem('panpuri_favs') || "[]");
            const isFav = favs.some(f => f.chineseText === lesson.chineseText);
            document.getElementById('favIcon').className = isFav ? "fas fa-heart text-red-500" : "far fa-heart text-gray-300";

            document.getElementById('lessonCounter').innerText = `${currentIndex + 1} / ${currentCategoryLessons.length}`;
            document.getElementById('resultBox').classList.add('hidden');
        }

        function toggleFavorite() {
            let favs = JSON.parse(localStorage.getItem('panpuri_favs') || "[]");
            const lesson = currentCategoryLessons[currentIndex];
            const idx = favs.findIndex(f => f.chineseText === lesson.chineseText);
            if(idx > -1) favs.splice(idx, 1); else favs.push(lesson);
            localStorage.setItem('panpuri_favs', JSON.stringify(favs));
            updateUI();
        }

        function loadFavoritesMode() {
            const favs = JSON.parse(localStorage.getItem('panpuri_favs') || "[]");
            if(favs.length === 0) return alert("ยังไม่มีรายการโปรด");
            currentCategoryLessons = favs; currentIndex = 0;
            document.getElementById('categoryBadge').innerText = "FAVORITES";
            updateUI();
        }

        function playExampleAudio() {
            const u = new SpeechSynthesisUtterance(document.getElementById('chineseText').innerText);
            u.lang = 'zh-CN'; u.rate = 0.8; window.speechSynthesis.speak(u);
        }

        function speakWord(w) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(w);
            u.lang = 'zh-CN'; u.rate = 0.8; window.speechSynthesis.speak(u);
        }

        function toggleAIVoice() {
            isAIVoiceEnabled = !isAIVoiceEnabled;
            document.getElementById('voiceIcon').className = isAIVoiceEnabled ? "fas fa-volume-up mr-1" : "fas fa-volume-mute mr-1";
            document.getElementById('voiceText').innerText = isAIVoiceEnabled ? "ON" : "OFF";
        }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ audioBase64: reader.result, targetSentence: document.getElementById('chineseText').innerText }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    }).then(res => res.json()).then(data => {
                        document.getElementById('resultBox').classList.remove('hidden');
                        document.getElementById('scoreText').innerText = data.score;
                        document.getElementById('wrongWordsText').innerText = data.wrong_words.join(', ') || 'None';
                        document.getElementById('feedbackText').innerText = data.feedback;
                        if(isAIVoiceEnabled) {
                            const u = new SpeechSynthesisUtterance(data.feedback);
                            u.lang = 'th-TH'; window.speechSynthesis.speak(u);
                        }
                        document.getElementById('statusMsg').innerText = "Analysis Done";
                    });
                };
            };
            audioChunks = []; mediaRecorder.start();
            document.getElementById('recordBtn').classList.add('mic-recording');
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('stopBtn').classList.remove('opacity-20');
            document.getElementById('statusMsg').innerText = "Listening...";
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('recordBtn').classList.remove('mic-recording');
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusMsg').innerText = "Analyzing...";
        }
    </script>
</body>
</html>
