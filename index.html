<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PANPURI Chinese Teacher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Prompt', 'Noto Sans SC', sans-serif; background-color: #f8fafc; }
    .mic-recording { animation: pulse 1.5s infinite; background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
  </style>
</head>
<body>
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-md relative flex flex-col">
    <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between bg-white sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white shadow-sm"><i class="fas fa-leaf text-xs"></i></div>
            <div>
                <h1 class="font-bold text-gray-900 leading-none">PAÑPURI</h1>
                <span class="text-[10px] text-gray-500 tracking-wider">CHINESE TEACHER</span>
            </div>
        </div>
    </div>

    <div class="p-5 flex flex-col gap-4 flex-grow">
        <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 text-center relative shadow-sm mt-2">
            <span class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-black text-white text-[10px] px-3 py-1 rounded-full tracking-widest">หมวดน้ำหอม</span>
            <p class="text-gray-400 text-xs mt-2">ประโยคเป้าหมาย:</p>
            <h2 id="chineseText" class="text-2xl font-bold text-gray-900 mt-2 mb-1">这是我们最畅销的标志性香味。</h2>
            <p class="text-gray-500 italic text-sm">(Zhè shì wǒmen zuì chàngxiāo de biāozhì xìng xiāngwèi.)</p>
            <div class="mt-4 pt-4 border-t border-gray-200"><p class="text-sm text-gray-600">ความหมาย: นี่คือกลิ่นซิกเนเจอร์ที่ขายดีที่สุดของเรา</p></div>
        </div>

        <div class="flex justify-center items-center gap-6 my-6">
            <button onclick="playExampleAudio()" class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shadow-sm border border-blue-100 hover:bg-blue-100 transition"><i class="fas fa-volume-up text-lg"></i></button>
            <button id="recordBtn" onclick="startRecording()" class="w-16 h-16 rounded-full bg-gray-50 text-gray-700 flex items-center justify-center shadow-md border border-gray-200 hover:bg-gray-100 transition relative"><i class="fas fa-microphone text-2xl"></i></button>
            <button id="stopBtn" onclick="stopRecording()" class="w-12 h-12 rounded-full bg-red-50 text-red-400 flex items-center justify-center shadow-sm border border-red-100 hover:bg-red-100 transition opacity-50 cursor-not-allowed" disabled><i class="fas fa-paper-plane text-lg text-red-500"></i></button>
        </div>

        <div id="statusMsg" class="text-center text-sm text-blue-600 h-6 font-medium animate-pulse"></div>

        <div id="resultBox" class="hidden bg-green-50 rounded-2xl p-5 border border-green-100 shadow-sm transition-all">
            <h3 class="font-bold text-green-800 border-b border-green-200 pb-2 mb-3"><i class="fas fa-check-circle mr-2"></i>ผลการประเมิน</h3>
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-700 text-sm">คะแนน:</span>
                <span class="text-3xl font-bold text-green-600"><span id="scoreText">0</span><span class="text-sm text-green-500">/100</span></span>
            </div>
            <div class="mb-3">
                <span class="text-gray-700 block text-xs mb-1">คำที่ควรปรับปรุง:</span>
                <span id="wrongWordsText" class="text-red-500 font-medium bg-red-50 border border-red-100 px-2 py-1 rounded text-sm inline-block"></span>
            </div>
            <div>
                <span class="text-gray-700 block text-xs mb-1">คำแนะนำ:</span>
                <p id="feedbackText" class="text-gray-800 text-sm bg-white p-3 rounded-lg border border-green-100 shadow-sm"></p>
            </div>
        </div>
    </div>
  </div>

  <script>
    // 🛑 เอา URL ที่คัดลอกจากขั้นตอนที่ 1 มาวางในเครื่องหมายคำพูดด้านล่างนี้ 🛑
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx5BbEVTO6AWXdX0i9NrpapSgMGOK7t_y4824z5ikh_tid4DTjLNIR_oxcTbTvpmQ-Y/exec"; 

    let mediaRecorder;
    let audioChunks = [];
    const targetSentence = "这是我们最畅销的标志性香味。";

    function playExampleAudio() {
      if ('speechSynthesis' in window) {
        const textToRead = document.getElementById('chineseText').innerText;
        const utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.lang = 'zh-CN'; utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          sendToAI(audioBlob);
          audioChunks = []; 
        };
        mediaRecorder.start();
        
        document.getElementById('recordBtn').disabled = true;
        document.getElementById('recordBtn').classList.add('mic-recording');
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('stopBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        document.getElementById('statusMsg').innerText = "กำลังฟัง... พูดได้เลยครับ";
        document.getElementById('resultBox').classList.add('hidden');
      } catch (err) {
        alert("กรุณาอนุญาตการใช้ไมโครโฟนในการตั้งค่าเบราว์เซอร์ครับ");
      }
    }

    function stopRecording() {
      mediaRecorder.stop();
      document.getElementById('recordBtn').disabled = false;
      document.getElementById('recordBtn').classList.remove('mic-recording');
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('stopBtn').classList.add('opacity-50', 'cursor-not-allowed');
      document.getElementById('statusMsg').innerText = "กำลังวิเคราะห์น้ำเสียง... รอสักครู่ ⏳";
    }

    // ฟังก์ชันส่งข้อมูลด้วย fetch API แทน google.script.run
    function sendToAI(blob) {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = function() {
        const base64data = reader.result;
        
        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ audioBase64: base64data, targetSentence: targetSentence }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } // ใช้ text/plain เลี่ยงปัญหา CORS
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('statusMsg').innerText = "";
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('scoreText').innerText = data.score || 0;
            const wrongWords = (data.wrong_words && data.wrong_words.length > 0) ? data.wrong_words.join(", ") : "ไม่มี (เป๊ะมาก!)";
            document.getElementById('wrongWordsText').innerText = wrongWords;
            document.getElementById('feedbackText').innerText = data.feedback || "พยายามต่อไปครับ!";
        })
        .catch(error => {
            document.getElementById('statusMsg').innerText = "❌ ขัดข้อง: " + error.message;
        });
      };
    }
  </script>
</body>
</html>
